<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IA_VISIONNAIRE</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,Helvetica,sans-serif}
body{
    background:radial-gradient(circle at top,#0a1a2f,#000);
    color:#fff;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}
.container{
    max-width:900px;
    width:95%;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:30px;
    align-items:center;
}
@media(max-width:768px){
    .container{grid-template-columns:1fr;text-align:center}
}
.title{
    font-size:3rem;
    font-weight:800;
    letter-spacing:2px;
    margin-bottom:20px;
}
.subtitle{
    font-size:1.5rem;
    margin-bottom:10px;
    opacity:.9;
}
.tagline{
    font-size:1.1rem;
    opacity:.8;
}
.qr-box{
    background:#fff;
    padding:15px;
    border-radius:12px;
    display:inline-block;
    margin-bottom:15px;
}
.qr-box img{
    width:200px;
    height:200px;
}
.scan-text{
    font-size:1rem;
    font-weight:600;
    color:#fff;
}
.ai-head{
    width:100%;
    max-width:350px;
    margin:auto;
    filter:drop-shadow(0 0 20px #00bfff);
}
footer{
    position:fixed;
    bottom:10px;
    width:100%;
    text-align:center;
    font-size:.8rem;
    opacity:.5;
}
</style>
</head>

<body>

<div class="container">

    <!-- GAUCHE -->
    <div>
        <div class="title">IA_VISIONNAIRE</div>
        <div class="qr-box">
            <!-- Remplacer src par ton QR (local ou base64) -->
            <img src="qr.png" alt="QR IA_VISIONNAIRE">
        </div>
        <div class="scan-text">Scannez pour télécharger</div>
    </div>

    <!-- DROITE -->
    <div>
        <!-- Image IA (locale recommandée) -->
        <img class="ai-head" src="ai_head.png" alt="IA Visionnaire">
        <div class="subtitle">INTELLIGENCE ARTIFICIELLE VISIONNAIRE</div>
        <div class="tagline">Votre mentor numérique avec CLI embarquée</div>
    </div>

</div>

<footer>
© IA_VISIONNAIRE — NetSecurePro IA
</footer>

</body>
</html>
